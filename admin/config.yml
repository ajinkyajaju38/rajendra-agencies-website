backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "Products"
    folder: "_products"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select",
         options: ["Lab Chemicals","Pharma Products","Scientific Instruments","Lab Glassware","Consumables"]}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Image", name: "image", widget: "image", required: false}

  - name: "settings"
    label: "Business Settings"
    files:
      - label: "Contact Info"
        name: "contact"
        file: "_data/contact.yml"
        fields:
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "WhatsApp", name: "whatsapp", widget: "string"}
          - {label: "Address", name: "address", widget: "text"}
          - {label: "Business Hours", name: "hours", widget: "string"}
